<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uphar Shringar Reward</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#fff;
width:90%;
max-width:400px;
padding:25px;
border-radius:20px;
text-align:center;
box-shadow:0 0 15px rgba(0,0,0,.2);
}

h1{
color:#b8860b;
}

p{
font-size:18px;
}

button{
width:100%;
padding:15px;
font-size:18px;
border:none;
border-radius:10px;
margin-top:15px;
cursor:pointer;
}

.join{
background:#25D366;
color:white;
}

.reward{
background:#ff9800;
color:white;
display:none;
}

#gift{
display:none;
margin-top:20px;
font-size:26px;
font-weight:bold;
color:red;
}
</style>
</head>

<body>

<div class="box">

<h1>🎁 UPHAR SHRINGAR</h1>

<p>
WhatsApp Community Join karke Reward Paye.
</p>

<a href="YOUR_WHATSAPP_LINK" target="_><a href="https://chat.whatsapp.com/LFdLbHkoK0iBfLWeK1XUB0" target="_blank">
<button class="join" onclick="joined()">
📲 WhatsApp Join
</button>
</a>

<button class="reward" id="rewardBtn" onclick="reward()">
🎁 Claim Reward
</button>

<div id="gift"></div>

</div>

<script>

function joined(){
setTimeout(function(){
document.getElementById("rewardBtn").style.display="block";
},3000);
}

function reward(){

var code=Math.floor(1000+Math.random()*9000);

document.getElementById("gift").style.display="block";

document.getElementById("gift").innerHTML=
"🎉 Mubarak!<br><br>Your Reward Code:<br><h1>"+code+"</h1><br>Is code ko shop par dikhaiye.";

}

</script>

</body>
</html>
